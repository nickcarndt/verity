[project]
name = "verity-evals"
version = "0.1.0"
description = "Braintrust eval harness for Verity invoice reconciliation"
requires-python = ">=3.11"
dependencies = [
    "braintrust>=0.5.0",
    "mcp>=1.28.0",
    "pydantic>=2.0",
    "verity-shared @ file:../../packages/shared",
]

[project.scripts]
verity-eval = "evals.experiments.reconcile_baseline:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evals"]

[tool.hatch.metadata]
allow-direct-references = true
