[project]
name = "verity-shared"
version = "0.1.0"
description = "Shared domain schemas for the Verity invoice-reconciliation agent"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["shared"]
