services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: verity-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verity}
      POSTGRES_DB: ${POSTGRES_DB:-verity}
    volumes:
      - verity_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verity} -d ${POSTGRES_DB:-verity}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  verity_pgdata:
